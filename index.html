<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUFood — Food Republic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>
</head>
<body class="font-sans bg-cream text-ink antialiased">
  <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-line shadow-sm">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-3 px-6 sm:px-8 py-4">
      <a href="location-select.html" class="flex items-center gap-3">
        <span class="flex items-center justify-center w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-accent-deep text-white font-extrabold text-sm shadow-accent-glow">CU</span>
        <span class="flex flex-col leading-tight">
          <span class="text-lg font-extrabold tracking-tight text-ink">CUFood</span>
          <span class="text-xs font-medium text-muted hidden sm:block">Food Republic · Chandigarh University</span>
        </span>
      </a>
      <div class="flex items-center gap-2">
        <a href="location-select.html" id="location-indicator" class="inline-flex items-center gap-1 text-sm font-semibold text-muted bg-white border border-line rounded-full px-4 py-2 shadow-sm hover:text-accent-deep hover:border-accent-soft hover:bg-accent-soft hover:shadow transition-all duration-150 whitespace-nowrap">Switch location</a>
        <a href="restaurant-login.html" class="inline-flex items-center gap-1 text-sm font-semibold text-muted bg-white border border-line rounded-full px-4 py-2 shadow-sm hover:text-accent-deep hover:border-accent-soft hover:bg-accent-soft hover:shadow transition-all duration-150 whitespace-nowrap">Restaurant Login</a>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 sm:px-8 py-12 sm:py-16">
    <section class="relative mb-10">
      <p class="flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-accent-deep mb-3">
        <span class="w-4 h-0.5 rounded bg-gradient-to-r from-accent to-accent-deep"></span>
        Chandigarh University
      </p>
      <h1 id="hero-title" class="text-4xl sm:text-5xl font-extrabold tracking-tight text-ink leading-[1.05] mb-4">Restaurants</h1>
      <p id="hero-subtitle" class="text-base sm:text-lg text-muted max-w-xl leading-relaxed">Search a dish or browse every outlet.</p>
    </section>

    <div class="relative mb-12">
      <span class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-muted pointer-events-none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </span>
      <input
        type="text"
        id="search-input"
        placeholder="Search for restaurant or dish"
        autocomplete="off"
        class="w-full rounded-full border-2 border-line bg-white pl-14 pr-6 py-4 text-base font-medium text-ink placeholder:text-muted placeholder:font-normal shadow-sm focus:outline-none focus:border-accent focus:ring-4 focus:ring-accent-soft transition-all duration-150"
      >
    </div>

    <section id="search-results" class="hidden flex flex-col gap-3 mb-12"></section>

    <section id="restaurant-row-section">
      <h2 class="text-xs font-bold uppercase tracking-widest text-muted mb-5">Outlets</h2>
      <div id="restaurant-row" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-5">
        <p class="col-span-full text-sm font-medium text-muted" id="restaurant-status">Loading restaurants...</p>
      </div>
    </section>
  </main>

  <footer class="relative border-t border-line pt-8 pb-10 text-center">
    <p class="text-sm font-medium text-muted">CUFood · Chandigarh University Food Republic</p>
  </footer>

  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
