<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUFood — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="tailwind.config.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#d9531e">
</head>
<body class="font-sans bg-cream text-ink antialiased">
  <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-line shadow-sm">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-6 sm:px-8 py-4">
      <a href="location-select.html" class="flex items-center gap-3">
        <span class="flex items-center justify-center w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-accent-deep text-white font-extrabold text-sm shadow-accent-glow">CU</span>
        <span class="flex flex-col leading-tight">
          <span class="text-lg font-extrabold tracking-tight text-ink">CUFood</span>
          <span class="text-xs font-medium text-muted hidden sm:block">Checkout</span>
        </span>
      </a>
      <a href="#" id="back-link" class="inline-flex items-center gap-1.5 text-sm font-semibold text-muted hover:text-accent-deep transition-all duration-150">&larr; Back to menu</a>
    </div>
  </header>

  <main class="relative overflow-hidden bg-gradient-to-br from-cream via-cream to-accent-soft/20 min-h-[calc(100vh-69px)]">
    <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-accent-soft blur-3xl opacity-50 pointer-events-none"></div>
    <div class="relative max-w-2xl mx-auto px-6 sm:px-8 py-10 sm:py-12">
      <div id="page-content">
        <p class="text-sm font-medium text-muted">Loading your cart...</p>
      </div>
    </div>
  </main>

  <footer class="relative border-t border-line bg-white/40">
    <div class="max-w-6xl mx-auto px-6 sm:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
      <a href="location-select.html" class="flex items-center gap-2.5">
        <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-gradient-to-br from-accent to-accent-deep text-white font-extrabold text-xs shadow-accent-glow">CU</span>
        <span class="flex flex-col leading-tight">
          <span class="text-sm font-extrabold tracking-tight text-ink">CUFood</span>
          <span class="text-[11px] font-medium text-muted">Live campus food availability</span>
        </span>
      </a>
      <p class="text-xs font-medium text-muted">© 2026 CUFood · Chandigarh University</p>
    </div>
  </footer>

  <script src="icons.js"></script>
  <script src="cart.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
